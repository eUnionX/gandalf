appname = gandalf
httpport = 8000
runmode = dev
copyrequestbody = true

# Storage: a dedicated `gandalf` database on the shared eUnionX Postgres.
# The database is created by the gandalf-init step before this service starts.
driverName = postgres
dataSourceName = "user=eunionx password=eunionx_dev_only host=postgres port=5432 sslmode=disable dbname=gandalf"
dbName = gandalf
tableNamePrefix =
showSql = false

# Public origin of this Gandalf instance (used to build OIDC issuer + links).
origin = "http://localhost:18000"
originFrontend =

redisEndpoint =
defaultStorageProvider =
isCloudIntranet = false
authState = "gandalf"
verificationCodeTimeout = 10
initScore = 0
logPostOnly = true
isUsernameLowered = false
staticBaseUrl = "https://cdn.casbin.org"
isDemoMode = false
batchSize = 100
enableGzip = true
ldapServerPort = 389
radiusServerPort = 1812
radiusDefaultOrganization = "built-in"
radiusSecret = "secret"
